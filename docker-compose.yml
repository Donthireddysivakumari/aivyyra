version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: aivyra-postgres-db
    restart: always
    environment:
      POSTGRES_USER: aivyra
      POSTGRES_PASSWORD: aivyra_pass
      POSTGRES_DB: aivyratutor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./aivyra-backend
    container_name: aivyra-fastapi-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://aivyra:aivyra_pass@db:5432/aivyratutor
      - SECRET_KEY=aivyra_super_secret_jwt_key_2026
    depends_on:
      - db

  frontend:
    build: ./aivyra-frontend
    container_name: aivyra-nextjs-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
