name: E2E and Functional Testing Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  run-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: aivyra
          POSTGRES_PASSWORD: aivyra_pass
          POSTGRES_DB: aivyratutor
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Set up Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: aivyra-frontend/package-lock.json

    - name: Install Headless Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Install Backend Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r aivyra-backend/requirements.txt

    - name: Install Test Python Dependencies
      run: |
        pip install -r tests/requirements.txt

    - name: Install Frontend Node Dependencies
      run: |
        cd aivyra-frontend
        npm ci

    - name: Start FastAPI Backend in Background
      env:
        DATABASE_URL: sqlite:///./aivyra.db
        SECRET_KEY: aivyra_super_secret_jwt_key_2026
      run: |
        cd aivyra-backend
        python run.py &
        echo "Waiting for FastAPI to start..."
        for i in {1..15}; do
          curl -sf http://127.0.0.1:8000/docs > /dev/null && echo "Backend is ready!" && break
          echo "Attempt $i: Backend not ready yet..."
          sleep 2
        done

    - name: Start Next.js Frontend in Background
      env:
        NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
      run: |
        cd aivyra-frontend
        npm run dev &
        echo "Waiting for Next.js to start..."
        for i in {1..20}; do
          curl -sf http://localhost:3000 > /dev/null && echo "Frontend is ready!" && break
          echo "Attempt $i: Frontend not ready yet..."
          sleep 3
        done

    - name: Execute Selenium E2E Test Suite
      env:
        FRONTEND_URL: http://localhost:3000
        BACKEND_URL: http://localhost:8000
      run: |
        python tests/test_runner.py

    - name: Upload Excel Test Report as Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: E2E-Test-Report-Excel
        path: E2E_Test_Report_Aivyra.xlsx
        if-no-files-found: warn

    - name: Commit and Push Report back to Repo
      if: always()
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add E2E_Test_Report_Aivyra.xlsx || true
        git diff-index --quiet HEAD || git commit -m "chore: update E2E test report [skip ci]"
        git push origin main || echo "Nothing to push"
