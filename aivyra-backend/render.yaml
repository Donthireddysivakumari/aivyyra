services:
  - type: web
    name: aivyra-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: SECRET_KEY
        value: aivyra_super_secret_jwt_key_2026
      - key: DATABASE_URL
        fromDatabase:
          name: aivyra-db
          property: connectionString
    autoDeploy: true

databases:
  - name: aivyra-db
    plan: free
    databaseName: aivyratutor
    user: aivyra
